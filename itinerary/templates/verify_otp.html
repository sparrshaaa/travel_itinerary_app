<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TravelPlanner - Verify OTP</title>

    <!-- Bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-color: #1e40af;
            --secondary-color: #1e3a8a;
            --accent-color: #3b82f6;
            --light-color: #f8f9fa;
            --dark-color: #0f172a;
            --gradient-primary: linear-gradient(135deg, #1e40af 0%, #1e3a8a 100%);
            --gradient-secondary: linear-gradient(135deg, #3b82f6 0%, #1e40af 100%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--dark-color);
            color: var(--light-color);
            min-height: 100vh;
            display: flex;
            align-items: center;
            background: linear-gradient(rgba(15, 23, 42, 0.9), rgba(15, 23, 42, 0.9)), 
                        url('https://images.unsplash.com/photo-1488646953014-85cb44e25828?ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D&auto=format&fit=crop&w=1935&q=80') no-repeat center center/cover;
        }

        .logo {
            font-weight: 700;
            font-size: 1.8rem;
            color: white;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1rem;
        }

        .logo-icon {
            margin-right: 10px;
            font-size: 2rem;
            color: var(--accent-color);
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.3);
        }

        .card-body {
            padding: 2.5rem;
        }

        .text-gradient {
            background: var(--gradient-secondary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .btn-primary {
            background: var(--gradient-primary);
            border: none;
            padding: 12px 30px;
            border-radius: 50px;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(30, 64, 175, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(30, 64, 175, 0.4);
            background: var(--gradient-primary);
        }

        .btn-outline-secondary {
            border: 2px solid var(--accent-color);
            color: var(--accent-color);
            background: transparent;
            padding: 10px 25px;
            border-radius: 50px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-outline-secondary:hover {
            background: var(--accent-color);
            color: var(--dark-color);
            transform: translateY(-3px);
        }

        .form-control {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: var(--light-color);
            border-radius: 10px;
            padding: 12px 15px;
            transition: all 0.3s ease;
            text-align: center;
            font-size: 1.2rem;
            font-weight: 600;
            letter-spacing: 5px;
        }

        .form-control:focus {
            background: rgba(255, 255, 255, 0.12);
            border-color: var(--accent-color);
            box-shadow: 0 0 0 0.25rem rgba(59, 130, 246, 0.25);
            color: var(--light-color);
        }

        .form-label {
            font-weight: 500;
            margin-bottom: 8px;
            color: var(--light-color);
        }

        .form-text {
            color: #adb5bd;
        }

        .text-danger {
            color: #f87171 !important;
        }

        .text-muted {
            color: #94a3b8 !important;
        }

        .shield-icon {
            color: var(--accent-color);
        }

        /* Animations */
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .floating {
            animation: float 6s ease-in-out infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .pulse {
            animation: pulse 3s infinite;
        }

        .email-highlight {
            color: var(--accent-color);
            font-weight: 600;
        }

        /* Responsive adjustments */
        @media (max-width: 576px) {
            .card-body {
                padding: 1.5rem;
            }
            
            .form-control {
                font-size: 1.1rem;
                letter-spacing: 3px;
            }
        }
    </style>
</head>

<body>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow border-0">
                <div class="card-body p-5">

                    <a href="#" class="logo">
                        <i class="fas fa-route logo-icon"></i>
                        TravelPlanner
                    </a>

                    <div class="text-center mb-4">
                        <i class="fas fa-shield-alt fa-3x shield-icon mb-3 floating"></i>
                        <h2 class="text-gradient">Verify OTP</h2>
                        <p class="text-muted">
                            OTP sent to: <strong class="email-highlight">{{ email }}</strong>
                        </p>
                    </div>

                    <form method="POST">
                        {% csrf_token %}

                        <div class="mb-4">
                            <label class="form-label">Enter 5-digit OTP</label>
                            {{ form.otp }}
                            {% if form.otp.errors %}
                                <div class="text-danger small mt-1">{{ form.otp.errors }}</div>
                            {% endif %}
                        </div>

                        <button type="submit" class="btn btn-primary w-100 py-2 mb-3 pulse">
                            <i class="fas fa-check-circle me-2"></i>Verify & Login
                        </button>
                    </form>

                    <div class="text-center">
                        <p class="text-muted mb-2">Didn't receive OTP?</p>
                        <a href="{% url 'resend_otp' %}" class="btn btn-outline-secondary">
                            <i class="fas fa-redo me-2"></i>Resend OTP
                        </a>
                    </div>

                </div>
            </div>
        </div>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
